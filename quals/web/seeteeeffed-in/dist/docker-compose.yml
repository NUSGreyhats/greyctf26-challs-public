services:
  db:
    image: postgres:18.3
    container_name: ctf-db
    environment:
      POSTGRES_DB: ctf
      POSTGRES_USER: <REDACT>
      POSTGRES_PASSWORD: <REDACT>
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ctf"]
      interval: 5s
      timeout: 5s
      retries: 20
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: ctf-backend
    environment:
      DB_DSN: dbname=ctf user=app_user password=<REDACT> host=db
      FLASK_APP: app.py
      FLASK_ENV: development
      CHALLENGE_FLAG: <REDACT>
    ports:
      - "34567:5000"
    depends_on:
      db:
        condition: service_healthy
  db-reset:
    image: postgres:18.3
    container_name: ctf-db-reset
    environment:
      PGHOST: db
      PGDATABASE: ctf
      PGUSER: <REDACT>
      PGPASSWORD: <REDACT>
      RESET_INTERVAL_SECONDS: 300
    volumes:
      - ./db/init.sql:/reset/init.sql:ro
      - ./scripts/auto-reset.sh:/reset/auto-reset.sh:ro
      - ./scripts/reset-db.sh:/reset/reset-db.sh:ro
    command: ["/bin/sh", "/reset/auto-reset.sh"]
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
