services:
  db:
    image: postgres:18
    command: ["postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-50}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-go_going_goen}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:0:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-go_going_goen}"]
      interval: 5s
      timeout: 5s
      retries: 10
    storage_opt:
      size: "2G"
